<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ニャンコRTS</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #03060f;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
}

/* ── Shared screen base ── */
  .screen {
  width: 100%;           /* 固定幅をやめ、画面幅いっぱいに */
  max-width: 390px;      /* 最大幅は維持 */
  height: 100dvh;        /* スマホのツールバーを除いた全画面高さ */
  background: #0a0f2e;
  display: none;         /* デフォルトは非表示 */
  flex-direction: column;
  position: relative;
  margin: 0 auto;
  overflow-y: auto;      /* 縦に長い場合にスクロールできるようにする */
  -webkit-overflow-scrolling: touch; /* iOSでのスクロールを滑らかに */
}

/* ボタンを押しやすくする */
button {
  cursor: pointer;
  touch-action: manipulation; /* ダブルタップズームを抑制し反応を速くする */
}

/* 以下のキャンバス設定を追加 */
#gc {
  width: 100%; /* 画面幅に合わせて自動縮小 */
  height: auto;
  aspect-ratio: 390 / 510; /* 元の縦横比をキープ */
  touch-action: none; /* スマホ特有のズームやスワイプ操作を無効化（ゲーム操作に集中させる） */
  -webkit-tap-highlight-color: transparent; /* タップ時の青い枠線を消す */
}

/* ボタンやカードなどのタップ時の青い枠線も消しておく */
button, .card, .home-btn {
  -webkit-tap-highlight-color: transparent;
}
.back-btn {
  background: transparent;
  color: #64748b;
  border: .5px solid #1e3a5f;
  border-radius: 6px;
  padding: 7px 14px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: color .12s, border-color .12s;
}
.back-btn:hover { color: #94a3b8; border-color: #334155; }
#flash-msg {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  color: #f1f5f9;
  border: .5px solid #334155;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.screen-header {
  background: #080d1e;
  border-bottom: 1.5px solid #1a2a4a;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-shrink: 0;
}
.screen-header h2 { font-size: 15px; font-weight: 600; color: #f1f5f9; }
.screen-scroll { flex: 1; overflow-y: auto; padding: 10px 12px; }
.screen-footer {
  background: #080d1e;
  border-top: 1.5px solid #1a2a4a;
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.save-btn {
  flex: 1;
  background: #1d4ed8;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 11px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background .12s;
}
.save-btn:hover { background: #2563eb; }

/* ════════════════════════
   HOME SCREEN
════════════════════════ */
#screen-home {
  justify-content: center;
  align-items: center;
  gap: 18px;
  padding: 52px 28px;
}
.home-title { font-size: 30px; font-weight: 700; color: #f1f5f9; letter-spacing: 1px; text-align: center; }
.home-title span { color: #fbbf24; }
.home-gold {
  font-size: 18px;
  color: #f59e0b;
  font-family: monospace;
  font-weight: 600;
  background: #0d1f3a;
  border: .5px solid #1e3a5f;
  border-radius: 10px;
  padding: 10px 28px;
  width: 100%;
  text-align: center;
}
.home-btn {
  width: 100%;
  padding: 15px;
  background: #0d1f3a;
  border: .5px solid #2563eb;
  border-radius: 12px;
  color: #e2e8f0;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background .12s, border-color .12s, transform .1s;
}
.home-btn:hover { background: #112240; border-color: #60a5fa; transform: translateY(-1px); }
.home-btn:active { transform: scale(.98); }
.hb-ico { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }
.hb-text { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
.hb-main { font-size: 14px; font-weight: 600; }
.hb-sub  { font-size: 11px; color: #64748b; }

/* ════════════════════════
   DECK BUILDER
════════════════════════ */
#screen-deck { display: none; }
.deck-count-badge {
  background: #1e3a5f;
  color: #93c5fd;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: monospace;
}
#deck-grid { display: flex; flex-direction: column; gap: 7px; }
.dbcard {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #0d1f3a;
  border: .5px solid #1e3a5f;
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: border-color .12s, background .12s;
}
.dbcard:hover { border-color: #2563eb; }
.dbcard.dbsel { border-color: #fbbf24; background: #1a1a08; }
.db-ico { flex-shrink: 0; }
.db-body { flex: 1; min-width: 0; }
.db-nm  { font-size: 13px; font-weight: 500; color: #e2e8f0; }
.db-type { font-size: 10px; color: #60a5fa; background: #0d2040; padding: 1px 5px; border-radius: 3px; }
.db-lv  { font-size: 10px; color: #fbbf24; font-family: monospace; }
.db-st  { font-size: 11px; color: #64748b; margin-top: 3px; }
.db-chk { font-size: 16px; color: #fbbf24; font-weight: 700; flex-shrink: 0; }

/* ════════════════════════
   UPGRADE SCREEN
════════════════════════ */
#screen-upgrade { display: none; }
.upgrade-gold-bar {
  background: #0d1f3a;
  border-bottom: 1.5px solid #1a2a4a;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  color: #f59e0b;
  font-family: monospace;
  text-align: center;
  flex-shrink: 0;
}
#upgrade-list { display: flex; flex-direction: column; gap: 8px; }
.up-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #0d1f3a;
  border: .5px solid #1e3a5f;
  border-radius: 10px;
  padding: 10px 12px;
}
.up-ico  { font-size: 26px; flex-shrink: 0; width: 32px; text-align: center; }
.up-mid  { flex: 1; min-width: 0; }
.up-nm   { font-size: 13px; font-weight: 500; color: #e2e8f0; }
.up-lv   { font-size: 10px; color: #fbbf24; font-family: monospace; }
.up-maxed-lbl { color: #22c55e; }
.up-stat { font-size: 10px; color: #64748b; margin-top: 2px; }
.up-stat b { color: #93c5fd; font-weight: 500; }
.up-track { height: 4px; background: #0c1627; border-radius: 2px; margin-top: 5px; overflow: hidden; }
.up-prog  { height: 100%; background: linear-gradient(90deg, #1d4ed8, #fbbf24); border-radius: 2px; transition: width .25s; }
.up-btn {
  background: #0c1627;
  color: #475569;
  border: .5px solid #1e3a5f;
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 11px;
  font-weight: 600;
  cursor: not-allowed;
  font-family: monospace;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .12s;
}
.up-btn-ok  { background: #0f2a10; color: #86efac; border-color: #166534; cursor: pointer; }
.up-btn-ok:hover { background: #14532d; }
.up-btn-max { background: #1a1f0d; color: #22c55e; border-color: #14532d; cursor: default; }

/* ════════════════════════
   STAGE SELECT
════════════════════════ */
#screen-stage { display: none; }
#stage-list { display: flex; flex-direction: column; gap: 10px; }
.st-card {
  background: #0d1f3a;
  border: .5px solid #1e3a5f;
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: border-color .12s, background .12s;
}
.st-card:hover  { border-color: #2563eb; }
.st-card.st-active { border-color: #fbbf24; background: #1a1608; }
.st-hd  { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
.st-ico { font-size: 30px; }
.st-nm  { font-size: 15px; font-weight: 600; color: #f1f5f9; }
.st-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
.st-det {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #475569;
  background: #060b1a;
  border-radius: 6px;
  padding: 6px 10px;
}
.battle-start-btn { font-size: 16px; font-weight: 700; }

/* ════════════════════════
   BATTLE SCREEN
════════════════════════ */
#screen-battle { display: none; flex-direction: column; align-items: center; }
#gw { position: relative; width: 390px; background: #0a0f2e; overflow: hidden; }
#gc { display: block; cursor: default; touch-action: none; }
#gc.placing { cursor: crosshair; }

/* HUD */
#hud { background: #080d1e; border-top: 1.5px solid #1a2a4a; padding: 10px 12px 12px; width: 390px; }
.grow  { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.glbl  { color: #f59e0b; font-size: 11px; font-weight: 600; min-width: 80px; font-family: monospace; white-space: nowrap; }
.gtrk  { flex: 1; height: 8px; background: #111827; border-radius: 4px; overflow: hidden; border: .5px solid #1e3a5f; }
.gfl   { height: 100%; background: linear-gradient(90deg, #b45309, #fbbf24); border-radius: 4px; transition: width .12s; }
#upbtn { background: #0f2a10; color: #86efac; border: .5px solid #166534; border-radius: 6px; padding: 4px 8px; font-size: 10px; cursor: pointer; white-space: nowrap; font-family: inherit; transition: background .12s; }
#upbtn:hover:not(:disabled) { background: #14532d; }
#upbtn:disabled { opacity: .3; cursor: not-allowed; }
#timer { font-size: 10px; color: #334155; min-width: 34px; text-align: right; font-family: monospace; }

/* In-battle cards */
#deck { display: flex; gap: 6px; flex-wrap: nowrap; }
.card {
  flex: 1 1 0; min-width: 0;
  height: 92px;
  background: #0d1f3a;
  border: .5px solid #2563eb;
  border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: 7px 3px 4px;
  cursor: pointer; position: relative; overflow: hidden;
  user-select: none; -webkit-user-select: none;
  transition: border-color .12s, transform .1s, box-shadow .12s;
}
.card:hover:not(.dim):not(.oncd) { border-color: #60a5fa; transform: translateY(-2px); }
.card:active:not(.dim):not(.oncd) { transform: scale(.96); }
.card.selected { border-color: #fbbf24 !important; box-shadow: 0 0 10px rgba(251,191,36,.35); }
.card.dim   { opacity: .28; cursor: not-allowed; border-color: #1e3a5f; }
.card.oncd  { cursor: not-allowed; border-color: #374151; }
.cico { line-height: 1; margin-bottom: 3px; }
.cnm  { font-size: 8px; color: #93c5fd; font-weight: 500; text-align: center; line-height: 1.2; }
.ctyp { font-size: 7px; color: #4b5563; margin-top: 2px; }
.ccost { position: absolute; bottom: 4px; right: 4px; background: #f59e0b; color: #000; font-weight: 700; font-size: 9px; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
.cdov { position: absolute; inset: 0; background: rgba(0,0,0,.78); display: none; align-items: center; justify-content: center; border-radius: 10px; font-size: 15px; font-weight: 700; color: #f1f5f9; font-family: monospace; }
#deck-toggle { width: 100%; margin-top: 7px; background: #1e293b; color: #94a3b8; border: .5px solid #334155; border-radius: 6px; padding: 6px; font-size: 11px; cursor: pointer; font-family: inherit; }
#deck-toggle:hover { background: #334155; color: #f1f5f9; }
#phint { margin-top: 7px; text-align: center; font-size: 10px; color: #f59e0b; min-height: 13px; font-style: italic; }
.card-spell {
  background: linear-gradient(135deg, #1e0a2e 0%, #3d105e 100%) !important;
  border: 1px solid #a855f7 !important;
}

.card-spell .ctyp {
  color: #d8b4fe;
}
/* Win/Lose overlay */
#ov { position: absolute; inset: 0; background: rgba(4,7,18,.93); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 50; }
#oico { font-size: 52px; line-height: 1; }
#otit { font-size: 26px; font-weight: 500; color: #f1f5f9; }
#osub { font-size: 13px; color: #64748b; text-align: center; max-width: 260px; line-height: 1.6; }
#oreward { font-size: 12px; color: #94a3b8; text-align: center; line-height: 2; background: #0d1f3a; border: .5px solid #1e3a5f; border-radius: 8px; padding: 10px 20px; min-width: 190px; }
.ov-btns { display: flex; gap: 10px; }
#rbtn { background: #0f2a10; color: #86efac; border: .5px solid #166534; padding: 10px 22px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; font-family: inherit; transition: background .15s; }
#rbtn:hover { background: #14532d; }
#hbtn { background: #1d4ed8; color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 500; font-family: inherit; transition: background .15s; }
#hbtn:hover { background: #2563eb; }

#intro { padding: 8px 12px; background: #060b1a; border-top: .5px solid #1a2a4a; width: 390px; }
#intro p { font-size: 9.5px; color: #334155; line-height: 1.6; text-align: center; }

canvas, .card, button {
  touch-action: manipulation; /* ダブルタップズームを禁止して反応を速くする */
  -webkit-tap-highlight-color: transparent; /* タップ時の青い枠を消す */
}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div id="screen-home" class="screen">
  <p class="home-title">⚔ <span>ニャンコ</span>RTS</p>
  <div class="home-gold" id="home-gold">💰 0 G</div>

  <button class="home-btn" onclick="openDeck()">
    <span class="hb-ico">🃏</span>
    <div class="hb-text">
      <span class="hb-main">デッキ編成</span>
      <span class="hb-sub">出撃ユニットを選ぶ（最大10体）</span>
    </div>
  </button>

  <button class="home-btn" onclick="openUpgrade()">
    <span class="hb-ico">⬆</span>
    <div class="hb-text">
      <span class="hb-main">ユニット強化</span>
      <span class="hb-sub">ゴールドでHP・ATKを最大2.0倍まで強化</span>
    </div>
  </button>

  <button class="home-btn" onclick="openBaseUpgrade()">
    <span class="hb-ico">🏯</span>
    <div class="hb-text">
      <span class="hb-main">拠点強化</span>
      <span class="hb-sub">ゴールドで拠点の各種能力をアップ</span>
    </div>
  </button>

  <button class="home-btn" onclick="openStage()">
    <span class="hb-ico">▶</span>
    <div class="hb-text">
      <span class="hb-main">ステージ選択 &amp; 出撃</span>
      <span class="hb-sub">難易度を選んで戦闘開始</span>
    </div>
  </button>
</div>

<!-- ═══ DECK BUILDER ═══ -->
<div id="screen-deck" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home'); refreshHomeGold()">← 戻る</button>
    <h2>デッキ編成</h2>
    <span class="deck-count-badge" id="deck-count">0 / 10</span>
  </div>
  <div class="screen-scroll">
    <div id="deck-grid"></div>
  </div>
  <div class="screen-footer">
    <button class="back-btn" onclick="showScreen('home'); refreshHomeGold()">キャンセル</button>
    <button class="save-btn" onclick="saveDeck()">保存する</button>
  </div>
</div>

<!-- ═══ UPGRADE ═══ -->
<div id="screen-upgrade" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home'); refreshHomeGold()">← 戻る</button>
    <h2>ユニット強化</h2>
  </div>
  <div class="upgrade-gold-bar" id="upgrade-gold">💰 0 G</div>
  <div class="screen-scroll">
    <div id="upgrade-list"></div>
  </div>
</div>

<!-- ═══ BASEUPGRADE ═══ -->
<div id="screen-base-up" class="screen" style="display: none;">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home'); refreshHomeGold()">← 戻る</button>
    <h2>拠点強化</h2>
  </div>
  <div class="upgrade-gold-bar" id="base-upgrade-gold">💰 0 G</div>
  <div class="screen-scroll">
    <div id="base-upgrade-list"></div>
  </div>
</div>

<!-- ═══ STAGE SELECT ═══ -->
<div id="screen-stage" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home'); refreshHomeGold()">← 戻る</button>
    <h2>ステージ選択</h2>
  </div>
  <div class="screen-scroll">
    <div id="stage-list"></div>
  </div>
  <div class="screen-footer">
    <button class="save-btn battle-start-btn" onclick="startBattle()">⚔ 出撃！</button>
  </div>
</div>

<!-- ═══ BATTLE ═══ -->
<div id="screen-battle" class="screen">
  <div id="gw">
    <canvas id="gc" width="390" height="510"></canvas>
    <div id="hud">
      <div class="grow">
        <span class="glbl" id="glbl">💰 0 / 100</span>
        <div class="gtrk"><div class="gfl" id="gfl" style="width:0%"></div></div>
        <button id="upbtn">上限UP [G70]</button>
        <span id="timer">00:00</span>
      </div>
      <div id="deck"></div>
      <button id="deck-toggle" onclick="toggleDeck()">デッキを切り替える (1-5 ⇄ 6-10)</button>
      <div id="phint"></div>
    </div>
    <div id="intro">
      <p>ユニットを選択 → キャンバスをクリックして好きなX位置に配置 ／ 敵拠点🏰を破壊すれば勝利</p>
    </div>
    
    <!-- Win/Lose overlay -->
    <div id="ov">
      <div id="oico">🏆</div>
      <h2 id="otit">勝利！</h2>
      <p id="osub"></p>
      <div id="oreward"></div>
      <div class="ov-btns">
        <button id="rbtn" onclick="startBattle()">もう一度</button>
        <button id="hbtn" onclick="goHome()">ホームへ</button>
      </div>
    </div>
  </div>
</div>

<!-- Flash message -->
<div id="flash-msg"></div>

<script src="unit.js"></script>
<script src="enemies.js"></script>
<script src="wave.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>
<script src="home.js"></script>
</body>
</html>
